spring.application.name=PortalCiudadaniaBack

# Puerto (configurable)
server.port=${PORT:8080}

# ======================
# DATABASE
# ======================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/vote4tech}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ======================
# CORS
# ======================
config.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200,http://localhost:3000,http://127.0.0.1:3000}

# ======================
# LOGGING (opcional)
# ======================
logging.level.org.springframework=${LOG_LEVEL:INFO}
