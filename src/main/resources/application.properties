spring.application.name=PortalCiudadaniaBack
spring.config.import=optional:file:.env[.properties]

# Puerto (configurable)
server.port=${PORT:8082}

# ======================
# DATABASE
# ======================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ======================
# CORS
# ======================
config.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200,http://localhost:3000,http://127.0.0.1:3000}

# ======================
# LOGGING (opcional)
# ======================
logging.level.org.springframework=${LOG_LEVEL:INFO}
